name: Build PaperVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install buildozer cython

    - name: Create buildozer.spec
      run: |
        echo "Creating buildozer.spec..."
        cat > buildozer.spec << 'EOF'
        [app]
        title = PaperVault
        package.name = papervault
        package.domain = org.papervault
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        source.include_patterns = assets/*,*.py
        requirements = python3,kivy
        version = 1.0.0
        android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
        android.api = 30
        android.minapi = 21
        android.sdk = 30
        android.ndk = 23b
        fullscreen = 1
        orientation = portrait
        bootstrap = sdl2
        p4a.branch = release-2022.12.20
        EOF
        echo "✅ buildozer.spec created!"
        cat buildozer.spec

    - name: Check files
      run: |
        echo "📁 Files in repository:"
        ls -la
        echo ""
        echo "🔍 Checking for main.py..."
        if [ -f "main.py" ]; then
          echo "✅ main.py found!"
        else
          echo "❌ main.py NOT found!"
          exit 1
        fi

    - name: Build with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PaperVault-APK
        path: bin/*.apk
        if-no-files-found: error
